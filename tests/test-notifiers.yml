name: Test notifier optional inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        continue-on-error: true
        uses: .
        with:
          title: "Test Notifiers Form"
          interactive: |
            fields:
              - label: choice
                properties:
                  display: Select an option
                  type: select
                  description: Available options
                  choices: ["option-a", "option-b"]
                  required: true
          timeout: "10"
          ngrok-authtoken: "fake-ngrok-token-for-testing"
          github-token: "fake-github-token"
          notifier-slack-enabled: "true"
          notifier-slack-token: "fake-slack-token"
          notifier-slack-channel: "#test-channel"
          notifier-slack-thread-ts: "1234567890.123456"
          notifier-slack-bot: "test-bot"
          notifier-discord-enabled: "true"
          notifier-discord-webhook: "https://discord.com/api/webhooks/fake/token"
          notifier-discord-thread-id: "987654321"
          notifier-discord-username: "test-discord-user"
      - name: Assert action ran (may fail due to invalid tokens)
        run: |
          echo "Action completed with outcome: ${{ steps.action.outcome }}"
          echo "PASS: action step was reached"
