name: Test basic usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        continue-on-error: true
        uses: .
        with:
          title: "Test Interactive Form"
          interactive: |
            fields:
              - label: random-string
                properties:
                  display: Enter a random string
                  type: text
                  description: A random string up to 20 characters long
                  maxLength: 20
                  required: false
          timeout: "10"
          ngrok-authtoken: "fake-ngrok-token-for-testing"
          github-token: "fake-github-token"
          notifier-slack-enabled: "false"
          notifier-slack-token: "fake-slack-token"
          notifier-slack-channel: "#test"
          notifier-discord-enabled: "false"
          notifier-discord-webhook: "https://discord.com/api/webhooks/fake"
      - name: Assert action ran (may fail due to invalid tokens)
        run: |
          echo "Action completed with outcome: ${{ steps.action.outcome }}"
          echo "PASS: action step was reached"
