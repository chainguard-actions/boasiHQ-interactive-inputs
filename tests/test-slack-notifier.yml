name: Test Slack notifier inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          title: "Slack Notifier Test Form"
          interactive: |
            fields:
              - label: random-string
                properties:
                  display: Enter a random string
                  type: text
                  description: A random string
                  required: false
          timeout: "10"
          ngrok-authtoken: "fake-ngrok-authtoken-for-testing"
          github-token: "fake-github-token-for-testing"
          notifier-slack-enabled: "true"
          notifier-slack-token: "fake-slack-token"
          notifier-slack-channel: "#test-notifications"
          notifier-slack-bot: "TestBot"
          notifier-slack-thread-ts: "1234567890.123456"
          notifier-discord-enabled: "false"
          notifier-discord-webhook: ""
      - name: Assert action ran with Slack inputs
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          echo "PASS: action step was invoked with Slack notifier inputs"
