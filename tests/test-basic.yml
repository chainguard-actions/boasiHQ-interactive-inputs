name: Test basic usage with title
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          title: "My Interactive Form"
          ngrok-authtoken: "fake-ngrok-token-for-testing"
          github-token: "fake-github-token"
          interactive: |
            fields:
              - label: my-text
                properties:
                  display: Enter some text
                  type: text
                  required: false
          timeout: "30"
          notifier-slack-enabled: "false"
          notifier-slack-token: ""
          notifier-slack-channel: "#notifications"
          notifier-discord-enabled: "false"
          notifier-discord-webhook: ""
      - name: Assert action was invoked
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # The action requires real ngrok credentials to succeed.
          # We verify it was invoked (outcome is either success or failure, not skipped).
          outcome="${{ steps.action.outcome }}"
          if [ "$outcome" = "skipped" ]; then
            echo "FAIL: action was skipped, expected it to be invoked"
            exit 1
          fi
          echo "PASS: action was invoked with outcome=$outcome"
