name: Test basic usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          title: "Test Interactive Form"
          interactive: |
            fields:
              - label: my-text
                properties:
                  display: Enter some text
                  type: text
                  required: false
          timeout: "10"
          ngrok-authtoken: "fake-ngrok-token-for-testing"
          github-token: "fake-github-token"
          notifier-slack-enabled: "false"
          notifier-slack-token: "fake-slack-token"
          notifier-slack-channel: "#test"
          notifier-slack-bot: "test-bot"
          notifier-slack-thread-ts: "1234567890.123456"
          notifier-discord-enabled: "false"
          notifier-discord-webhook: "https://discord.com/api/webhooks/fake/webhook"
          notifier-discord-thread-id: "123456789"
          notifier-discord-username: "test-bot"
      - name: Assert action ran (expected to fail without real credentials)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "Action outcome: $OUTCOME"
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action executed (outcome=$OUTCOME)"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi
